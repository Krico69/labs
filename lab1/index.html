<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №1 — Форма</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }

        h1 {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 24px;
        }

        .form-card {
            background: #fff;
            border-radius: 8px;
            padding: 28px 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: #555;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button[type="submit"] {
            margin-top: 24px;
            width: 100%;
            padding: 11px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #357abd;
        }
    </style>
</head>
<body>

    <h1>Введіть ваші дані</h1>

    <div class="form-card">
        <!--
            Форма надсилає дані методом POST на скрипт process.php.
            Метод POST приховує дані від відображення в URL.
        -->
        <form action="process.php" method="POST">

            <!-- Поле для введення імені -->
            <label for="firstName">Ім'я</label>
            <input
                type="text"
                id="firstName"
                name="firstName"
                placeholder="Наприклад: Іван"
                maxlength="50"
            >

            <!-- Поле для введення прізвища -->
            <label for="lastName">Прізвище</label>
            <input
                type="text"
                id="lastName"
                name="lastName"
                placeholder="Наприклад: Петренко"
                maxlength="50"
            >

            <!-- Кнопка відправки форми -->
            <button type="submit">Надіслати</button>

        </form>
    </div>

</body>
</html>
